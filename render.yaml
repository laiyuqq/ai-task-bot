services:
  - type: web
    name: ai-task-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: DATA_DIR
        value: /tmp
      - key: PYTHON_VERSION
        value: 3.11.0
